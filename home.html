<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- daisy ui and tcss setup -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fontawesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="./style.css" />
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
  </head>
  <body class="geist-font bg-base-200 min-h-screen">
    <header
      class="flex items-center justify-between border-b-2 border-b-gray-400/20 py-3 md:px-20 px-5"
    >
      <div class="flex items-center gap-3">
        <img
          height="36"
          width="36"
          src="./assets/github-logo.png"
          alt="github-logo"
        />
        <p class="font-semibold md:text-xl text-sm">GitHub Issues Tracker</p>
      </div>

      <div>
        <div class="join">
          <div>
            <label class="input validator join-item">
              <svg
                class="h-[1em] opacity-50"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
              >
                <g
                  stroke-linejoin="round"
                  stroke-linecap="round"
                  stroke-width="2.5"
                  fill="none"
                  stroke="currentColor"
                >
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="m21 21-4.3-4.3"></path>
                </g>
              </svg>
              <input
                id="search-input"
                type="text"
                placeholder="Search issues..."
                required
              />
            </label>
            <div class="validator-hint hidden">Enter valid email address</div>
          </div>
          <button class="btn btn-primary join-item" onclick="searchIssue()">
            Search
          </button>
        </div>
      </div>
    </header>

    <main class="md:pt-16 pt-8">
      <section
        class="md:max-w-9/12 max-w-11/12 mx-auto bg-white p-6 gap-2 rounded-lg border border-gray-400/20 flex flex-wrap"
      >
        <button
          id="all"
          class="btn btn-primary min-w-[90px] category-btn"
          onclick="btnEvent('all')"
        >
          All
        </button>
        <button
          id="open"
          class="btn min-w-[90px] category-btn"
          onclick="btnEvent('open')"
        >
          Open
        </button>
        <button
          id="closed"
          class="btn min-w-[90px] category-btn"
          onclick="btnEvent('closed')"
        >
          Closed
        </button>
      </section>

      <section
        class="md:max-w-9/12 max-w-11/12 mx-auto flex flex-wrap gap-3 justify-between rounded-tl-lg rounded-tr-lg bg-white mt-4 p-3 md:p-6 sm:p-5 border-b border-gray-400/40"
      >
        <div class="flex gap-2 items-center">
          <div
            class="h-[50px] w-[50px] rounded-full bg-[#ECE4FF] flex items-center justify-center"
          >
            <img src="./assets/Aperture.png" alt="Aperture" />
          </div>

          <div>
            <div class="flex gap-1 font-bold md:text-xl text-lg">
              <span id="issues-count">50</span>
              <p>Issues</p>
            </div>
            <p class="text-[#64748B]">Track and manage your project issues</p>
          </div>
        </div>

        <div class="flex gap-4">
          <div class="flex gap-1 items-center font-semibold">
            <div class="h-3 w-3 bg-[#00A96E] rounded-full"></div>
            <p>Open</p>
          </div>

          <div class="flex gap-1 items-center font-semibold">
            <div class="h-3 w-3 bg-[#A855F7] rounded-full"></div>
            <p>Closed</p>
          </div>
        </div>
      </section>

      <section
        id="issues-container"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 p-5 sm:p-6 bg-base-400 md:max-w-9/12 max-w-11/12 mx-auto rounded-bl-lg rounded-br-lg"
      >
        <!-- Issue Card -->
      </section>
      <section id="spinner" class="flex justify-center items-center min-h-40">
        <span class="loading loading-dots loading-xl"></span>
      </section>

      <!-- Open the modal using ID.showModal() method -->
      <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
          <div id="modal-container"></div>
          <div class="modal-action">
            <form method="dialog">
              <!-- if there is a button in form, it will close the modal -->
              <button class="btn btn-primary">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </main>

    <script src="./script.js"></script>
  </body>
</html>

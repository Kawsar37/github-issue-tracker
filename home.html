<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- daisy ui and tcss setup -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fontawesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="geist-font bg-[#F8FAFC]">
    <header
      class="flex items-center justify-between border border-b-gray-400/20 py-3 px-20"
    >
      <div class="flex items-center gap-3">
        <img
          height="36"
          width="36"
          src="./assets/github-logo.png"
          alt="github-logo"
        />
        <p class="font-semibold text-xl">GitHub Issues Tracker</p>
      </div>

      <div>
        <div class="join">
          <div>
            <label class="input validator join-item">
              <svg
                class="h-[1em] opacity-50"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
              >
                <g
                  stroke-linejoin="round"
                  stroke-linecap="round"
                  stroke-width="2.5"
                  fill="none"
                  stroke="currentColor"
                >
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="m21 21-4.3-4.3"></path>
                </g>
              </svg>
              <input type="text" placeholder="Search issues..." required />
            </label>
            <div class="validator-hint hidden">Enter valid email address</div>
          </div>
          <button class="btn btn-primary join-item">Search</button>
        </div>
      </div>
    </header>

    <script src="./script.js"></script>
  </body>
</html>

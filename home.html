<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- daisy ui and tcss setup -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fontawesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="geist-font bg-base-200">
    <header
      class="flex items-center justify-between border-b-2 border-b-gray-400/20 py-3 md:px-20 px-5"
    >
      <div class="flex items-center gap-3">
        <img
          height="36"
          width="36"
          src="./assets/github-logo.png"
          alt="github-logo"
        />
        <p class="font-semibold md:text-xl text-sm">GitHub Issues Tracker</p>
      </div>

      <div>
        <div class="join">
          <div>
            <label class="input validator join-item">
              <svg
                class="h-[1em] opacity-50"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
              >
                <g
                  stroke-linejoin="round"
                  stroke-linecap="round"
                  stroke-width="2.5"
                  fill="none"
                  stroke="currentColor"
                >
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="m21 21-4.3-4.3"></path>
                </g>
              </svg>
              <input type="text" placeholder="Search issues..." required />
            </label>
            <div class="validator-hint hidden">Enter valid email address</div>
          </div>
          <button class="btn btn-primary join-item">Search</button>
        </div>
      </div>
    </header>

    <main class="md:pt-16 pt-8">
      <section
        class="md:max-w-9/12 max-w-11/12 mx-auto bg-white p-6 gap-2 rounded-lg border border-gray-400/20 flex flex-wrap"
      >
        <button class="btn btn-primary min-w-[90px]">All</button>
        <button class="btn btn-outline min-w-[90px]">Open</button>
        <button class="btn btn-outline min-w-[90px]">Closed</button>
      </section>

      <section
        class="md:max-w-9/12 max-w-11/12 mx-auto flex flex-wrap gap-3 justify-between rounded-tl-lg rounded-tr-lg bg-white mt-4 p-3 md:p-6 sm:p-5 border-b border-gray-400/40"
      >
        <div class="flex gap-2 items-center">
          <div
            class="h-[50px] w-[50px] rounded-full bg-[#ECE4FF] flex items-center justify-center"
          >
            <img src="./assets/Aperture.png" alt="Aperture" />
          </div>

          <div>
            <div class="flex gap-1 font-bold md:text-xl text-lg">
              <span>50</span>
              <p>Issues</p>
            </div>
            <p class="text-[#64748B]">Track and manage your project issues</p>
          </div>
        </div>

        <div class="flex gap-4">
          <div class="flex gap-1 items-center font-semibold">
            <div class="h-3 w-3 bg-[#00A96E] rounded-full"></div>
            <p>Open</p>
          </div>

          <div class="flex gap-1 items-center font-semibold">
            <div class="h-3 w-3 bg-[#A855F7] rounded-full"></div>
            <p>Closed</p>
          </div>
        </div>
      </section>

      <section id="issues-container" class="grid grid-col-1 md:grid-col-3 lg:grid-col-4 p-5 sm:p-6 bg-base-400 md:max-w-9/12 max-w-11/12 mx-auto shadow-xl rounded-bl-lg rounded-br-lg">
       <!-- Issue Card -->
        <div
          id="issue-card"
          class="bg-white border-t-3 border-t-green-500 rounded-xl"
        >
          <div class="p-4 space-y-2">
            <div class="flex justify-between">
            <img
            width="32"
              id="status-icon"
              src="./assets/Open-Status.png"
              alt="Open-Status"
            />

            <div id="priority" class="text-red-400 px-4 py-1 bg-red-400/20 rounded-full">High</div>
          </div>

          <h4 class="font-semibold">Fix Naviggation Menu on Mobile Devices</h4>

          <p class="text-[#64748B]">
            The navigation menu doesn't collapse properly on mobile devices...
          </p>

          <div id="labels" class="flex flex-wrap gap-1">
            <span
              class="bg-red-200/50 text-red-600 px-2 py-1 rounded-full border-2 border-red-300 small flex items-center justify-center gap-1"
              ><i class="fa-solid fa-bug"></i> BUG</span
            >
            <span
              class="bg-amber-200/50 text-amber-600 px-2 py-1 rounded-full border-2 border-amber-300 small flex items-center justify-center gap-1"
              ><i class="fa-regular fa-life-ring"></i></i> HELP WANTED</span
            >
            <span
              class="bg-green-200/50 text-green-600 px-2 py-1 rounded-full border-2 border-green-300 small flex items-center justify-center gap-1"
              ><i class="fa-solid fa-wand-magic-sparkles"></i>ENHANCEMENT</span
            >
          </div>
          </div>
          <div class="text-[#64748B] space-y-2 p-4 border-t border-t-gray-400/30">
            <p>#1 by jon_doe</p>
            <p>1/15/2024</p>
          </div>
        </div>
        
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
